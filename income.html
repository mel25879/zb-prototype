<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>我的收入</title>
  <link rel="stylesheet" href="assets/css/common.css?v=7">
</head>
<body data-title="我的收入">
  <div id="app"></div>
  <script src="assets/js/common.js?v=7"></script>
  <script>
    /* =================================================================
       我的收入 · 按需求文档实现
       Tab：
         L1：① 我的用户交易佣金   ② 我获得的分成佣金
         L2：仅 ①（不渲染 Tab 条）
       状态枚举：结算中 / 已结算
       ================================================================= */

    /* ============== 角色 ============== */
    function getRole() {
      try { return localStorage.getItem('zb_agent_role') || 'L1'; }
      catch (e) { return 'L1'; }
    }

    /* ============== Toast / 工具 ============== */
    function toast(msg, type) {
      const t = document.createElement('div');
      t.className = `toast toast-${type || 'success'}`;
      t.innerHTML = `<span class="toast-ico">${type === 'danger' ? '✕' : '✓'}</span>${msg}`;
      document.body.appendChild(t);
      requestAnimationFrame(() => t.classList.add('show'));
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 250); }, 2000);
    }
    function fmtUSDT(v) {
      return Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' USDT';
    }
    // 含负数（手续费）的格式化
    function fmtUSDSigned(v) {
      const n = Number(v);
      const abs = Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return (n < 0 ? '-' : '') + abs + ' USDT';
    }
    // 状态 tag：待结算 / 结算中 / 已结算
    function statusTag(status) {
      const map = {
        '待结算': 'st-wait',
        '结算中': 'st-pending',
        '已结算': 'st-settled',
      };
      return `<span class="st-tag ${map[status] || ''}">${status}</span>`;
    }
    // 备注：待结算订单显示原因；其它状态显示 "—"
    // 简短文案展示在表格内，完整说明通过 title 在 hover 时显示
    // incomeType: 'rebate'（Tab ① 返佣）| 'share'（Tab ② 分成）
    function settleRemark(status, incomeType) {
      if (status === '待结算') {
        const incomeName = incomeType === 'share' ? '分成金额' : '返佣金额';
        const full = `历史用户当月累计平仓金额 ≤ 1,000 USDT，${incomeName}进入「待结算」状态，暂不结算。`;
        return `<span class="remark-pending" title="${full}">历史用户当月累计平仓 ≤ 1,000 USDT</span>`;
      }
      return '<span class="muted">—</span>';
    }

    /* ============== Mock 数据 ============== */
    // Tab ①：我的用户交易佣金
    //   列：用户邮箱 / 平仓单号 / 平仓时间 / 平仓交易额 / 手续费 /
    //       返佣比例 / 返佣金额 / 结算时间 / 结算状态（待结算/结算中/已结算）/ 备注
    const COMM_DATA = [
      { email: '202605285@qq.com',   closeNo: 'TX20260518023', closeTime: '2026-05-31 15:34:10', closeAmt: 10000, fee: -100, rebateRate: 80, rebateAmt: 80,  settleTime: '—',                  status: '结算中' },
      { email: '202605285@qq.com',   closeNo: 'TX20260518024', closeTime: '2026-05-31 15:34:10', closeAmt: 10000, fee: -100, rebateRate: 80, rebateAmt: 80,  settleTime: '2026-05-31 16:34:10', status: '已结算' },
      // 历史用户单笔小额平仓：触发"待结算"规则（当月累计平仓 ≤ 1,000 USDT）
      { email: 'frank***@qq.com',    closeNo: 'TX20260530011', closeTime: '2026-05-30 09:21:00', closeAmt: 400,   fee: -4,   rebateRate: 80, rebateAmt: 3.2, settleTime: '—',                  status: '待结算' },
      { email: 'alice***@gmail.com', closeNo: 'TX20260517019', closeTime: '2026-05-17 12:30:00', closeAmt: 50000, fee: -500, rebateRate: 80, rebateAmt: 400, settleTime: '2026-05-18 00:00:10', status: '已结算' },
      { email: 'bob***@outlook.com', closeNo: 'TX20260515008', closeTime: '2026-05-15 21:10:00', closeAmt: 20000, fee: -200, rebateRate: 80, rebateAmt: 160, settleTime: '—',                  status: '结算中' },
      // 另一条历史用户的待结算
      { email: 'frank***@qq.com',    closeNo: 'TX20260512007', closeTime: '2026-05-12 16:08:00', closeAmt: 200,   fee: -2,   rebateRate: 80, rebateAmt: 1.6, settleTime: '—',                  status: '待结算' },
    ];

    // Tab ②：我获得的分成佣金
    //   列：用户邮箱 / 代理邮箱 / 平仓单号 / 平仓时间 / 平仓交易额 /
    //       手续费 / 订单佣金 / 我给代理设置的分成比例 / 分成金额 /
    //       结算时间 / 结算状态（待结算/结算中/已结算）/ 备注
    const SHARE_DATA = [
      { email: '202605282@qq.com',   agentEmail: '202605285@qq.com', closeNo: 'TX20260518023', closeTime: '2026-05-31 15:34:10', closeAmt: 10000, fee: -100, orderComm: 80, shareRate: 30, myShare: 24,  settleTime: '—',                  status: '结算中' },
      { email: '202605282@qq.com',   agentEmail: '202605285@qq.com', closeNo: 'TX20260518024', closeTime: '2026-05-31 15:34:10', closeAmt: 10000, fee: -100, orderComm: 80, shareRate: 30, myShare: 24,  settleTime: '2026-05-31 16:34:10', status: '已结算' },
      // 历史用户单笔小额平仓：触发"待结算"规则
      { email: 'frank***@qq.com',    agentEmail: 'sub***@gmail.com', closeNo: 'TX20260529008', closeTime: '2026-05-29 14:20:00', closeAmt: 500,   fee: -5,   orderComm: 4,  shareRate: 50, myShare: 2,   settleTime: '—',                  status: '待结算' },
      { email: 'helen***@gmail.com', agentEmail: 'sub***@gmail.com', closeNo: 'TX20260517005', closeTime: '2026-05-17 11:30:00', closeAmt: 5000,  fee: -50,  orderComm: 40, shareRate: 70, myShare: 28,  settleTime: '2026-05-18 00:00:10', status: '已结算' },
    ];

    /* ============== 通用：日期范围 + 筛选按钮 ============== */
    function dateRangeWrap() {
      return `
        <div class="date-input-wrap">
          <svg class="date-ico" viewBox="0 0 24 24" width="16" height="16" fill="none">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="1.6"/>
          </svg>
          <input type="date" class="dt-input" title="平仓时间 起" />
          <span class="dt-sep">~</span>
          <input type="date" class="dt-input" title="平仓时间 止" />
        </div>
      `;
    }
    function filterActions() {
      return `
        <div class="filter-actions">
          <button class="btn-reset" data-act="reset">重置</button>
          <button class="btn-query" data-act="search">搜索</button>
        </div>
      `;
    }

    /* ============== Tab ①：我的用户交易佣金 ============== */
    function renderCommTab() {
      // 已结算返佣金额合计
      const total = COMM_DATA.filter(r => r.status === '已结算').reduce((s, r) => s + r.rebateAmt, 0);
      return `
        <div class="filter-row">
          ${dateRangeWrap()}
          <input type="text" class="form-input filter-input" placeholder="用户邮箱" />
          ${filterActions()}
        </div>

        <div class="sum-row">已结算返佣金额合计：<b class="sum-num">${fmtUSDT(total)}</b></div>

        <div class="table-wrap">
          <table class="data-table biz-table">
            <colgroup>
              <col style="width:12%">
              <col style="width:12%">
              <col style="width:11%">
              <col style="width:9%">
              <col style="width:7%">
              <col style="width:7%">
              <col style="width:9%">
              <col style="width:11%">
              <col style="width:7%">
              <col style="width:15%">
            </colgroup>
            <thead>
              <tr>
                <th>用户邮箱</th>
                <th>平仓单号</th>
                <th>平仓时间</th>
                <th class="text-right">平仓交易额</th>
                <th class="text-right">手续费</th>
                <th class="text-right">返佣比例</th>
                <th class="text-right">返佣金额</th>
                <th>结算时间</th>
                <th class="text-center">结算状态</th>
                <th>备注</th>
              </tr>
            </thead>
            <tbody>
              ${COMM_DATA.length ? COMM_DATA.map((r) => `
                <tr>
                  <td><span class="link-text">${r.email}</span></td>
                  <td class="mono">${r.closeNo}</td>
                  <td class="muted">${r.closeTime}</td>
                  <td class="text-right num">${fmtUSDT(r.closeAmt)}</td>
                  <td class="text-right num fee">${fmtUSDSigned(r.fee)}</td>
                  <td class="text-right num rate-num">${r.rebateRate}%</td>
                  <td class="text-right num strong">${fmtUSDT(r.rebateAmt)}</td>
                  <td class="muted">${r.settleTime}</td>
                  <td class="text-center">${statusTag(r.status)}</td>
                  <td class="remark-cell">${settleRemark(r.status, 'rebate')}</td>
                </tr>
              `).join('') : emptyRow(10)}
            </tbody>
          </table>
        </div>
        ${pagination(COMM_DATA.length)}
      `;
    }

    /* ============== Tab ②：我获得的分成佣金（L1） ============== */
    function renderShareTab() {
      const total = SHARE_DATA.filter(r => r.status === '已结算').reduce((s, r) => s + r.myShare, 0);
      return `
        <div class="filter-row">
          ${dateRangeWrap()}
          <input type="text" class="form-input filter-input" placeholder="用户邮箱" />
          <input type="text" class="form-input filter-input" placeholder="代理邮箱" />
          ${filterActions()}
        </div>

        <div class="sum-row">已结算分成金额合计：<b class="sum-num">${fmtUSDT(total)}</b></div>

        <div class="table-wrap">
          <table class="data-table biz-table">
            <colgroup>
              <col style="width:9%">
              <col style="width:10%">
              <col style="width:10%">
              <col style="width:10%">
              <col style="width:8%">
              <col style="width:7%">
              <col style="width:8%">
              <col style="width:9%">
              <col style="width:7%">
              <col style="width:9%">
              <col style="width:6%">
              <col style="width:7%">
            </colgroup>
            <thead>
              <tr>
                <th>用户邮箱</th>
                <th>代理邮箱</th>
                <th>平仓单号</th>
                <th>平仓时间</th>
                <th class="text-right">平仓交易额</th>
                <th class="text-right">手续费</th>
                <th class="text-right">订单佣金</th>
                <th class="text-right">我给代理设置的分成比例</th>
                <th class="text-right">分成金额</th>
                <th>结算时间</th>
                <th class="text-center">结算状态</th>
                <th>备注</th>
              </tr>
            </thead>
            <tbody>
              ${SHARE_DATA.length ? SHARE_DATA.map((r) => `
                <tr>
                  <td><span class="link-text">${r.email}</span></td>
                  <td><span class="agent-tag">${r.agentEmail}</span></td>
                  <td class="mono">${r.closeNo}</td>
                  <td class="muted">${r.closeTime}</td>
                  <td class="text-right num">${fmtUSDT(r.closeAmt)}</td>
                  <td class="text-right num fee">${fmtUSDSigned(r.fee)}</td>
                  <td class="text-right num">${fmtUSDT(r.orderComm)}</td>
                  <td class="text-right num rate-num">${r.shareRate}%</td>
                  <td class="text-right num strong">${fmtUSDT(r.myShare)}</td>
                  <td class="muted">${r.settleTime}</td>
                  <td class="text-center">${statusTag(r.status)}</td>
                  <td class="remark-cell">${settleRemark(r.status, 'share')}</td>
                </tr>
              `).join('') : emptyRow(12)}
            </tbody>
          </table>
        </div>
        ${pagination(SHARE_DATA.length)}
      `;
    }

    /* ============== 空态行 + 分页 ============== */
    function emptyRow(cols) {
      return `
        <tr class="empty-row">
          <td colspan="${cols}">
            <div class="empty-cell">
              <svg viewBox="0 0 64 64" width="48" height="48" class="empty-svg">
                <rect x="8" y="14" width="48" height="38" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
                <line x1="8" y1="24" x2="56" y2="24" stroke="#cbd5e1" stroke-width="1.5"/>
                <circle cx="14" cy="19" r="1.4" fill="#cbd5e1"/>
                <circle cx="18" cy="19" r="1.4" fill="#cbd5e1"/>
                <circle cx="22" cy="19" r="1.4" fill="#cbd5e1"/>
                <line x1="16" y1="36" x2="48" y2="36" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
                <line x1="16" y1="42" x2="40" y2="42" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span>暂无资料</span>
            </div>
          </td>
        </tr>
      `;
    }
    function pagination(total) {
      const totalPages = Math.max(1, Math.ceil(total / 20));
      return `
        <div class="pagination">
          <span class="page-info">共 <b>${total}</b> 条 / <b>${totalPages}</b> 页</span>
          <div class="page-size">
            <select class="form-select page-size-sel">
              <option>10 条/页</option>
              <option selected>20 条/页</option>
              <option>50 条/页</option>
              <option>100 条/页</option>
            </select>
          </div>
          <div class="page-btns">
            <button class="page-btn" data-page="first" title="首页">«</button>
            <button class="page-btn" data-page="prev"  title="上一页">‹</button>
            <button class="page-btn active">1</button>
            <button class="page-btn" data-page="next"  title="下一页">›</button>
            <button class="page-btn" data-page="last"  title="末页">»</button>
          </div>
        </div>
      `;
    }

    /* ============== 主框架 ============== */
    const PAGE_CONTENT = (function () {
      // L1 + L2 都有下级代理 → 都能拿到分成佣金（2 Tab）
      // L3 是最底层 → 只有用户交易佣金（1 Tab）
      const role = getRole();
      const showFullTabs = role === 'L1' || role === 'L2';
      const tabBar = showFullTabs ? `
        <div class="inv-tabs">
          <button class="inv-tab active" data-tab="comm">我的用户交易佣金</button>
          <button class="inv-tab" data-tab="share">我获得的分成佣金</button>
        </div>
      ` : '';

      return `
        <div class="page-header">
          <h1 class="page-title">我的收入</h1>
        </div>

        <div class="card sec-card">
          ${tabBar}
          <div class="inv-pane" id="incPane"></div>
        </div>
      `;
    })();

    let currentTab = 'comm';
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.inv-tab').forEach((b) => {
        b.classList.toggle('active', b.dataset.tab === tab);
      });
      const el = document.getElementById('incPane');
      el.innerHTML = tab === 'share' ? renderShareTab() : renderCommTab();
      bindPaneActions();
    }

    function bindPaneActions() {
      document.querySelectorAll('[data-act]').forEach((b) => {
        b.addEventListener('click', () => {
          const act = b.dataset.act;
          if (act === 'reset') {
            document.querySelectorAll('#incPane input, #incPane select').forEach((el) => { el.value = ''; });
            toast('已重置筛选', 'success');
          } else if (act === 'search') {
            toast('已搜索', 'success');
          }
        });
      });
      document.querySelectorAll('.page-btn').forEach((b) => {
        b.addEventListener('click', () => {
          if (b.classList.contains('active')) return;
          toast('翻页（占位）', 'success');
        });
      });
    }

    window.onPageReady = function () {
      document.querySelectorAll('.inv-tab').forEach((b) => {
        b.addEventListener('click', () => switchTab(b.dataset.tab));
      });
      switchTab('comm');
    };

    initLayout(PAGE_CONTENT);
  </script>

  <style>
    /* —— Tab —— */
    .sec-card { padding: 0; }
    .inv-tabs {
      display: flex; gap: 4px;
      padding: 0 18px;
      border-bottom: 1px solid var(--color-border);
    }
    .inv-tab {
      padding: 13px 16px;
      font-size: var(--fs-body);
      color: var(--color-text-secondary);
      background: transparent; border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: -1px;
      font-family: inherit;
    }
    .inv-tab:hover { color: var(--color-primary); }
    .inv-tab.active {
      color: var(--color-primary); font-weight: var(--fw-semibold);
      border-bottom-color: var(--color-primary);
    }
    .inv-pane { padding: 16px 20px 18px; }

    /* —— 筛选 —— */
    .filter-row {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap; margin-bottom: 12px;
    }
    .filter-input { min-width: 160px; max-width: 200px; }
    .filter-actions { margin-left: auto; display: flex; gap: 8px; }

    .date-input-wrap {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      border: 1px solid var(--color-border);
      border-radius: 6px; background: #fff;
    }
    .date-input-wrap:focus-within { border-color: var(--color-primary); }
    .date-ico { color: var(--color-text-muted); }
    .dt-input {
      border: none; outline: none;
      font-size: var(--fs-body); color: var(--color-text);
      background: transparent; width: 116px; font-family: inherit;
    }
    .dt-sep { color: var(--color-text-muted); padding: 0 2px; }

    .btn-query, .btn-reset {
      padding: 7px 18px; font-size: var(--fs-body); border-radius: 6px;
      cursor: pointer; border: none; transition: all 0.15s; font-family: inherit;
    }
    .btn-query { color: #fff; background: var(--color-primary); }
    .btn-query:hover { background: var(--color-primary-hover); }
    .btn-reset { color: var(--color-text); background: #fff; border: 1px solid var(--color-border); }
    .btn-reset:hover { border-color: var(--color-primary); color: var(--color-primary); }

    /* —— 合计行 —— */
    .sum-row {
      padding: 9px 14px;
      background: linear-gradient(90deg, rgba(0,200,150,0.08) 0%, rgba(0,200,150,0) 100%);
      border-left: 3px solid var(--color-primary);
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: var(--fs-body);
      color: var(--color-text);
    }
    .sum-num {
      color: var(--color-primary);
      font-weight: var(--fw-bold);
      font-size: var(--fs-h3);
      font-family: ui-monospace, monospace;
      margin-left: 4px;
    }

    /* —— 表 —— */
    .biz-table {
      table-layout: fixed;
      width: 100%;
    }
    .biz-table th, .biz-table td {
      vertical-align: middle;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 11px 12px;
    }
    .muted { color: var(--color-text-muted); }
    .strong { font-weight: var(--fw-semibold); color: var(--color-text); }
    .mono {
      font-family: ui-monospace, 'SF Mono', Consolas, monospace;
      color: var(--color-text);
      font-size: var(--fs-body-sm);
    }
    .num {
      font-family: ui-monospace, 'SF Mono', Consolas, monospace;
      color: var(--color-text);
    }
    .num.strong { color: var(--color-primary); }
    .num.fee { color: #dc2626; }
    .num.rate-num { color: var(--color-warning); font-weight: var(--fw-semibold); }
    .link-text { color: var(--color-text); font-weight: var(--fw-medium); }

    /* 代理 tag */
    .agent-tag {
      display: inline-block; padding: 2px 8px;
      background: rgba(58,161,255,0.08);
      color: #3aa1ff; border-radius: 3px;
      font-size: var(--fs-body-sm);
      font-family: ui-monospace, monospace;
    }

    /* 结算状态：待结算 / 结算中 / 已结算 */
    .st-tag {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 10px;
      font-size: var(--fs-body-sm);
      font-weight: var(--fw-semibold);
    }
    .st-wait    { background: #fee2e2; color: #b91c1c; }
    .st-pending { background: #fef3c7; color: #b45309; }
    .st-settled { background: #dcfce7; color: #15803d; }

    /* —— 备注列 —— */
    /* 待结算订单的备注：橙色文字 + 截断显示，hover 完整 title 提示 */
    .remark-cell {
      font-size: var(--fs-meta);
      color: var(--color-text-muted);
    }
    .remark-pending {
      display: inline-block;
      max-width: 100%;
      color: #b45309;
      cursor: help;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: bottom;
    }
    .remark-pending::before {
      content: "ⓘ ";
      color: var(--color-warning);
      font-weight: bold;
    }

    /* 表头允许换行：防止"我给代理设置的分成比例"等长标题被截断 */
    .biz-table th {
      white-space: normal;
      line-height: 1.4;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    /* 空态行 */
    .empty-row td { padding: 0; border-bottom: none; }
    .empty-cell {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      padding: 56px 20px;
      color: var(--color-text-muted);
      font-size: var(--fs-meta);
    }
    .empty-svg { opacity: 0.7; }

    /* 分页 */
    .pagination {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 14px; margin-top: 14px;
    }
    .page-info { font-size: var(--fs-meta); color: var(--color-text-secondary); }
    .page-info b { color: var(--color-text); }
    .page-size-sel {
      padding: 5px 24px 5px 10px;
      font-size: var(--fs-body-sm);
      border-radius: 4px;
      border: 1px solid var(--color-border);
      background: #fff; cursor: pointer; font-family: inherit;
    }
    .page-btns { display: flex; gap: 4px; }
    .page-btn {
      min-width: 28px; height: 28px;
      padding: 0 8px;
      border: 1px solid var(--color-border);
      background: #fff; color: var(--color-text);
      cursor: pointer; border-radius: 4px;
      font-size: var(--fs-body-sm);
      transition: all 0.15s; font-family: inherit;
    }
    .page-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .page-btn.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff; cursor: default;
    }
  </style>
</body>
</html>
