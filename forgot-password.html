<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>忘记密码 - ZB Agent</title>
  <link rel="stylesheet" href="assets/css/common.css?v=7">
  <style>
    /* —————————————————————————————————————— 整体布局（与 login.html 一致） */
    html, body { height: 100%; overflow: hidden; }
    body {
      display: flex;
      min-height: 100vh;
      background: #fff;
    }

    .login-left {
      flex: 1;
      background: linear-gradient(135deg, #00c896 0%, #00a87d 50%, #008b6a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .login-left::before {
      content: ''; position: absolute;
      top: -100px; right: -100px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .login-left::after {
      content: ''; position: absolute;
      bottom: -80px; left: -80px;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    .login-illustration {
      width: 100%; max-width: 420px;
      height: auto;
      margin-bottom: 36px;
      position: relative; z-index: 1;
    }
    .brand-title {
      font-size: 36px;
      font-weight: var(--fw-bold);
      letter-spacing: 4px;
      margin-bottom: 12px;
      position: relative; z-index: 1;
    }
    .brand-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 1px;
      position: relative; z-index: 1;
    }

    /* —————————————————————————————————————— 右侧表单区 */
    .login-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow-y: auto;
    }
    .lang-switch {
      position: absolute;
      top: 24px; right: 32px;
      display: inline-flex; align-items: center; gap: 6px;
      font-size: var(--fs-body-sm);
      color: var(--color-text-secondary);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .lang-switch:hover { background: #f0f3f7; color: var(--color-text); }

    .reset-form {
      width: 100%;
      max-width: 400px;
    }

    /* 返回 + 标题 */
    .reset-head { margin-bottom: 28px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: var(--fs-body);
      color: var(--color-text-secondary);
      text-decoration: none;
      margin-bottom: 14px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--color-primary); }
    .reset-title {
      font-size: 28px;
      font-weight: var(--fw-bold);
      color: var(--color-text);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .reset-subtitle {
      font-size: var(--fs-meta);
      color: var(--color-text-secondary);
    }

    /* Tab */
    .reset-tabs {
      display: flex; gap: 32px;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 22px;
    }
    .reset-tab {
      padding: 10px 0;
      font-size: var(--fs-body);
      color: var(--color-text-secondary);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      margin-bottom: -1px;
    }
    .reset-tab:hover { color: var(--color-primary); }
    .reset-tab.active {
      color: var(--color-primary);
      font-weight: var(--fw-semibold);
      border-bottom-color: var(--color-primary);
    }

    /* 表单 */
    .reset-field { margin-bottom: 18px; }
    .reset-label {
      display: block;
      font-size: var(--fs-body-sm);
      color: var(--color-text);
      font-weight: var(--fw-medium);
      margin-bottom: 8px;
    }
    .reset-input,
    .reset-form select {
      width: 100%;
      padding: 11px 14px;
      font-size: var(--fs-body);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      transition: border-color 0.2s;
      font-family: inherit;
      background: #fff;
    }
    .reset-input:focus { outline: none; border-color: var(--color-primary); }

    /* 手机号行（含国家码）*/
    .phone-row {
      display: flex;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }
    .phone-row:focus-within { border-color: var(--color-primary); }
    .phone-row select {
      width: 88px;
      padding: 11px 8px;
      border: none;
      border-right: 1px solid var(--color-border);
      background: #fafbfc;
      font-size: var(--fs-body);
      color: var(--color-text);
      cursor: pointer;
      font-family: inherit;
    }
    .phone-row input {
      flex: 1;
      padding: 11px 14px;
      border: none;
      font-size: var(--fs-body);
      font-family: inherit;
      outline: none;
    }

    /* 验证码行 */
    .code-row { display: flex; gap: 8px; }
    .code-row input {
      flex: 1;
      padding: 11px 14px;
      font-size: var(--fs-body);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      font-family: inherit;
    }
    .code-row input:focus { outline: none; border-color: var(--color-primary); }
    .btn-get-code {
      padding: 0 18px;
      font-size: var(--fs-body-sm);
      color: var(--color-primary);
      background: #fff;
      border: 1px solid var(--color-primary);
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      font-family: inherit;
      font-weight: var(--fw-medium);
    }
    .btn-get-code:hover { background: var(--color-primary); color: #fff; }
    .btn-get-code.disabled,
    .btn-get-code:disabled {
      color: var(--color-text-muted);
      border-color: var(--color-border);
      cursor: not-allowed;
      background: #fafbfc;
    }

    /* 新密码区块（Step 2，初始隐藏） */
    .new-pwd-section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px dashed var(--color-border);
      animation: slideDown 0.3s;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .new-pwd-input-wrap { position: relative; }
    .new-pwd-input { padding-right: 42px; }
    .pwd-toggle {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      width: 30px; height: 30px;
      border: none; background: transparent;
      cursor: pointer;
      color: var(--color-text-muted);
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
    }
    .pwd-toggle:hover { color: var(--color-text-secondary); }

    /* 提交按钮 */
    .reset-button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      font-size: var(--fs-body);
      font-weight: var(--fw-semibold);
      color: #fff;
      background: var(--color-primary);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(0,200,150,0.3);
      letter-spacing: 1px;
    }
    .reset-button:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0,200,150,0.4);
    }
    .reset-button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* 响应式 */
    @media (max-width: 900px) {
      .login-left { display: none; }
      .login-right { padding: 24px; }
    }
  </style>
</head>
<body>
  <!-- 左侧 Hero（与 login 一致） -->
  <div class="login-left">
    <svg class="login-illustration" viewBox="0 0 420 320" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="coin-grad2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fef3c7"/>
          <stop offset="50%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#d97706"/>
        </linearGradient>
        <linearGradient id="screen-grad2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#f0fdf8"/>
        </linearGradient>
      </defs>
      <ellipse cx="210" cy="290" rx="160" ry="14" fill="rgba(0,0,0,0.15)"/>
      <ellipse cx="210" cy="285" rx="170" ry="20" fill="rgba(255,255,255,0.18)"/>
      <path d="M 110 100 L 310 100 L 310 240 L 110 240 Z" fill="#1f3a4f"/>
      <rect x="118" y="108" width="184" height="124" rx="3" fill="url(#screen-grad2)"/>
      <g transform="translate(128, 120)">
        <g stroke="#e2e8f0" stroke-width="0.5">
          <line x1="0" y1="30" x2="160" y2="30"/>
          <line x1="0" y1="60" x2="160" y2="60"/>
          <line x1="0" y1="90" x2="160" y2="90"/>
        </g>
        <polyline points="0,90 20,75 40,82 60,60 80,68 100,42 120,48 140,28 160,18"
          fill="none" stroke="#00c896" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polygon points="0,90 20,75 40,82 60,60 80,68 100,42 120,48 140,28 160,18 160,100 0,100"
          fill="rgba(0,200,150,0.15)"/>
        <circle cx="160" cy="18" r="3" fill="#00c896"/>
        <circle cx="160" cy="18" r="6" fill="#00c896" opacity="0.25"/>
        <path d="M 130 8 L 160 8 L 160 -2 L 175 12 L 160 26 L 160 16 L 130 16 Z"
          fill="#00c896" transform="translate(-15, 0)"/>
      </g>
      <path d="M 90 240 L 330 240 L 345 260 L 75 260 Z" fill="#374151"/>
      <ellipse cx="210" cy="248" rx="22" ry="2" fill="#1f2937"/>
      <g transform="translate(60, 90)">
        <ellipse cx="0" cy="6" rx="32" ry="9" fill="rgba(120,53,15,0.2)"/>
        <path d="M -30 0 L -30 4 A 30 8 0 0 0 30 4 L 30 0 Z" fill="#92400e"/>
        <ellipse cx="0" cy="0" rx="30" ry="8" fill="url(#coin-grad2)" stroke="#b45309" stroke-width="0.5"/>
        <ellipse cx="0" cy="0" rx="22" ry="5.5" fill="none" stroke="#92400e" stroke-width="0.5" opacity="0.4"/>
        <text x="0" y="3" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#78350f">$</text>
      </g>
      <g transform="translate(40, 200) rotate(-15)">
        <ellipse cx="0" cy="8" rx="42" ry="11" fill="rgba(120,53,15,0.2)"/>
        <path d="M -40 0 L -40 6 A 40 10 0 0 0 40 6 L 40 0 Z" fill="#92400e"/>
        <ellipse cx="0" cy="0" rx="40" ry="10" fill="url(#coin-grad2)" stroke="#b45309" stroke-width="0.6"/>
        <ellipse cx="0" cy="0" rx="32" ry="7" fill="none" stroke="#92400e" stroke-width="0.6" opacity="0.4"/>
        <ellipse cx="-14" cy="-3" rx="8" ry="2" fill="rgba(255,255,255,0.55)"/>
        <text x="0" y="3.5" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#78350f">$</text>
      </g>
      <g transform="translate(360, 150) rotate(20)">
        <ellipse cx="0" cy="7" rx="38" ry="10" fill="rgba(120,53,15,0.2)"/>
        <path d="M -36 0 L -36 5 A 36 9 0 0 0 36 5 L 36 0 Z" fill="#92400e"/>
        <ellipse cx="0" cy="0" rx="36" ry="9" fill="url(#coin-grad2)" stroke="#b45309" stroke-width="0.5"/>
        <ellipse cx="0" cy="0" rx="28" ry="6.5" fill="none" stroke="#92400e" stroke-width="0.5" opacity="0.4"/>
        <ellipse cx="-12" cy="-2.5" rx="7" ry="1.8" fill="rgba(255,255,255,0.55)"/>
        <text x="0" y="3" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="700" fill="#78350f">$</text>
      </g>
      <circle cx="100" cy="50" r="4" fill="rgba(255,255,255,0.4)"/>
      <circle cx="380" cy="60" r="3" fill="rgba(255,255,255,0.35)"/>
      <circle cx="20" cy="160" r="3" fill="rgba(255,255,255,0.3)"/>
      <circle cx="395" cy="240" r="4" fill="rgba(255,255,255,0.35)"/>
    </svg>

    <div class="brand-title">代理管理后台</div>
    <div class="brand-sub">邀请好友进行交易，赚取更多收益</div>
  </div>

  <!-- 右侧 重置密码表单 -->
  <div class="login-right">
    <div class="lang-switch">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.6"/>
        <path d="M2 12h20 M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" stroke="currentColor" stroke-width="1.6"/>
      </svg>
      简体中文
    </div>

    <div class="reset-form">
      <!-- 顶部：返回 + 标题 -->
      <div class="reset-head">
        <a class="back-link" href="login.html">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <polyline points="15 18 9 12 15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          返回登录
        </a>
        <h1 class="reset-title">忘记密码</h1>
        <p class="reset-subtitle">您可选择手机 / 邮箱找回密码</p>
      </div>

      <!-- Tab 切换 -->
      <div class="reset-tabs">
        <button class="reset-tab active" data-method="phone">手机找回</button>
        <button class="reset-tab" data-method="email">邮箱找回</button>
      </div>

      <!-- 手机找回表单 -->
      <div class="reset-pane" id="paneRecover">
        <!-- Phone -->
        <div class="reset-field" data-when="phone">
          <label class="reset-label">手机号码</label>
          <div class="phone-row">
            <select id="phoneCountry">
              <option value="+86">+86</option>
              <option value="+852">+852</option>
              <option value="+886">+886</option>
              <option value="+62">+62</option>
              <option value="+65">+65</option>
              <option value="+1">+1</option>
            </select>
            <input type="tel" id="phoneNumber" placeholder="请输入手机号码" maxlength="11" />
          </div>
        </div>

        <!-- Email -->
        <div class="reset-field" data-when="email" style="display:none">
          <label class="reset-label">邮箱地址</label>
          <input type="email" class="reset-input" id="emailInput" placeholder="请输入邮件地址" />
        </div>

        <!-- 验证码 -->
        <div class="reset-field">
          <label class="reset-label">
            <span data-when="phone">手机验证码</span>
            <span data-when="email" style="display:none">邮箱验证码</span>
          </label>
          <div class="code-row">
            <input type="text" id="codeInput" placeholder="请输入验证码" maxlength="6" inputmode="numeric" />
            <button type="button" class="btn-get-code" id="btnGetCode">获取验证码</button>
          </div>
        </div>

        <!-- 新密码（验证后展开）-->
        <div class="new-pwd-section" id="newPwdSection" style="display:none">
          <div class="reset-field">
            <label class="reset-label">新密码</label>
            <div class="new-pwd-input-wrap">
              <input type="password" class="reset-input new-pwd-input" id="newPwd" placeholder="6-20 位，建议字母+数字组合" maxlength="20" />
              <button type="button" class="pwd-toggle" data-target="newPwd">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="reset-field">
            <label class="reset-label">确认密码</label>
            <div class="new-pwd-input-wrap">
              <input type="password" class="reset-input new-pwd-input" id="confirmPwd" placeholder="再次输入新密码" maxlength="20" />
              <button type="button" class="pwd-toggle" data-target="confirmPwd">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <button class="reset-button" id="btnReset">重置密码</button>
      </div>
    </div>
  </div>

  <script>
    /* ============== Toast ============== */
    function toast(msg, type) {
      const t = document.createElement('div');
      t.className = `toast toast-${type || 'success'}`;
      t.innerHTML = `<span class="toast-ico">${type === 'danger' ? '✕' : '✓'}</span>${msg}`;
      document.body.appendChild(t);
      requestAnimationFrame(() => t.classList.add('show'));
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 250); }, 2000);
    }

    /* ============== Tab 切换 ============== */
    let currentMethod = 'phone';
    function switchMethod(m) {
      currentMethod = m;
      document.querySelectorAll('.reset-tab').forEach((b) => {
        b.classList.toggle('active', b.dataset.method === m);
      });
      document.querySelectorAll('[data-when]').forEach((el) => {
        el.style.display = el.dataset.when === m ? '' : 'none';
      });
      // 切 tab 重置验证码状态
      resetCodeBtn();
      document.getElementById('codeInput').value = '';
      document.getElementById('newPwdSection').style.display = 'none';
    }
    document.querySelectorAll('.reset-tab').forEach((b) => {
      b.addEventListener('click', () => switchMethod(b.dataset.method));
    });

    /* ============== 输入限制 ============== */
    document.getElementById('phoneNumber').addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 11);
    });
    document.getElementById('codeInput').addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
    });

    /* ============== 获取验证码（60s 倒计时） ============== */
    let codeTimer = null;
    function startCodeCountdown() {
      const btn = document.getElementById('btnGetCode');
      let left = 60;
      btn.disabled = true; btn.classList.add('disabled');
      btn.textContent = `${left}s 后重发`;
      codeTimer = setInterval(() => {
        left--;
        if (left <= 0) resetCodeBtn();
        else btn.textContent = `${left}s 后重发`;
      }, 1000);
    }
    function resetCodeBtn() {
      if (codeTimer) { clearInterval(codeTimer); codeTimer = null; }
      const btn = document.getElementById('btnGetCode');
      btn.disabled = false; btn.classList.remove('disabled');
      btn.textContent = '获取验证码';
    }

    document.getElementById('btnGetCode').addEventListener('click', () => {
      if (currentMethod === 'phone') {
        const phone = document.getElementById('phoneNumber').value.trim();
        if (!/^\d{6,15}$/.test(phone)) return toast('请输入有效手机号', 'danger');
        const code = document.getElementById('phoneCountry').value;
        toast(`验证码已发送至 ${code} ${phone.slice(0,3)}****${phone.slice(-4)}`, 'success');
      } else {
        const email = document.getElementById('emailInput').value.trim();
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return toast('请输入有效邮箱', 'danger');
        toast(`验证码已发送至 ${email}`, 'success');
      }
      startCodeCountdown();
      // 自动展开新密码区
      document.getElementById('newPwdSection').style.display = 'block';
    });

    /* ============== 密码显示/隐藏 ============== */
    document.querySelectorAll('.pwd-toggle').forEach((btn) => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    });

    /* ============== 提交重置 ============== */
    document.getElementById('btnReset').addEventListener('click', () => {
      // 校验身份
      if (currentMethod === 'phone') {
        const phone = document.getElementById('phoneNumber').value.trim();
        if (!/^\d{6,15}$/.test(phone)) return toast('请输入有效手机号', 'danger');
      } else {
        const email = document.getElementById('emailInput').value.trim();
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return toast('请输入有效邮箱', 'danger');
      }

      // 校验验证码
      const code = document.getElementById('codeInput').value.trim();
      if (!/^\d{6}$/.test(code)) return toast('请输入 6 位验证码', 'danger');

      // 校验新密码（仅在新密码区可见时强校验）
      const newPwdSection = document.getElementById('newPwdSection');
      if (newPwdSection.style.display === 'none') {
        // 未获取验证码就点重置
        return toast('请先获取并输入验证码', 'danger');
      }
      const newPwd = document.getElementById('newPwd').value;
      const confirmPwd = document.getElementById('confirmPwd').value;
      if (!newPwd) return toast('请输入新密码', 'danger');
      if (newPwd.length < 6) return toast('密码至少 6 位', 'danger');
      if (newPwd !== confirmPwd) return toast('两次输入的密码不一致', 'danger');

      // 模拟成功
      const btn = document.getElementById('btnReset');
      btn.disabled = true; btn.textContent = '重置中...';

      setTimeout(() => {
        toast('密码重置成功，请使用新密码登录', 'success');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1000);
      }, 600);
    });
  </script>
</body>
</html>
