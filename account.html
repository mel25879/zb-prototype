<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>我的账户</title>
  <link rel="stylesheet" href="assets/css/common.css?v=7">
</head>
<body data-title="我的账户">
  <div id="app"></div>
  <script src="assets/js/common.js?v=7"></script>
  <script>
    /* =================================================================
       我的账户
         上：可提现金额（带"转账到交易账户"按钮） + 已提现金额
         下：转账记录（转账单号 / 转账时间 / 转账金额 / 转账状态）
         交互：点击按钮 → 二次确认弹窗 → 确认后立即到账
       ================================================================= */

    /* ============== Toast ============== */
    function toast(msg, type) {
      const t = document.createElement('div');
      t.className = `toast toast-${type || 'success'}`;
      t.innerHTML = `<span class="toast-ico">${type === 'danger' ? '✕' : '✓'}</span>${msg}`;
      document.body.appendChild(t);
      requestAnimationFrame(() => t.classList.add('show'));
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 250); }, 2000);
    }
    function fmtUSDT(v) {
      return Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' USDT';
    }

    /* ============== Mock 数据 ============== */
    const ACCOUNT = {
      withdrawable: 52.30,   // 可转账到交易账户的佣金余额（USDT）
      withdrawn:    245.80,  // 历史已转账（=已从佣金账户转出）的累计
    };

    // 转账记录：内部转账无需地址，状态只有 成功 / 失败
    const TRANSFER_RECORDS = [
      { orderNo: 'ITX1020260529831721', time: '2026-05-31 15:34:10', amount: 100.00, status: '转账成功' },
      { orderNo: 'ITX1020260515009203', time: '2026-05-15 14:23:08', amount:  50.00, status: '转账成功' },
      { orderNo: 'ITX1020260510087461', time: '2026-05-10 09:35:42', amount: 100.00, status: '转账成功' },
      { orderNo: 'ITX1020260503065520', time: '2026-05-03 16:18:55', amount:  30.00, status: '转账失败' },
      { orderNo: 'ITX1020260428012897', time: '2026-04-28 11:55:30', amount: 200.00, status: '转账成功' },
    ];

    /* ============== 状态 tag ============== */
    function resultTag(result) {
      const map = {
        '转账成功': 'st-success',
        '转账失败': 'st-fail',
      };
      return `<span class="st-tag ${map[result] || ''}">${result}</span>`;
    }

    /* ============== 主框架 ============== */
    const PAGE_CONTENT = `
      <div class="page-header">
        <h1 class="page-title">我的账户</h1>
      </div>

      <!-- 顶部：可提现 / 已提现 两张卡 -->
      <div class="balance-row">
        <!-- 可提现佣金 -->
        <div class="bal-card bal-card-pro">
          <svg class="bal-deco" viewBox="0 0 200 200" preserveAspectRatio="none">
            <defs>
              <linearGradient id="up-arrow-grad" x1="0" y1="1" x2="0" y2="0">
                <stop offset="0%" stop-color="rgba(0,200,150,0.04)"/>
                <stop offset="100%" stop-color="rgba(0,200,150,0.22)"/>
              </linearGradient>
            </defs>
            <path d="M120 160 L160 100 L200 100 L140 40 L80 100 L120 100 Z"
              fill="url(#up-arrow-grad)" />
          </svg>

          <div class="bal-inner">
            <div class="bal-label">可提现金额</div>
            <div class="bal-num bal-num-primary" id="balWithdrawable">${fmtUSDT(ACCOUNT.withdrawable)}</div>
            <div class="bal-actions">
              <button class="btn-bal-primary" id="btnTransfer">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none">
                  <path d="M4 7h13M14 4l3 3-3 3 M20 17H7m3 3l-3-3 3-3"
                        stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                转账到交易账户
              </button>
            </div>
          </div>
        </div>

        <!-- 已提现金额 -->
        <div class="bal-card">
          <div class="bal-inner">
            <div class="bal-label">已提现金额</div>
            <div class="bal-num bal-num-muted" id="balWithdrawn">${fmtUSDT(ACCOUNT.withdrawn)}</div>
          </div>
        </div>
      </div>

      <!-- 转账记录 -->
      <div class="card sec-card record-card">
        <div class="sec-head">
          <span class="sec-num">01</span>
          <div class="sec-text">
            <h3 class="sec-title">转账记录</h3>
            <p class="sec-sub">查看所有"佣金账户 → 交易账户"的转账明细</p>
          </div>
        </div>

        <div class="table-wrap">
          <table class="data-table biz-table">
            <colgroup>
              <col style="width:34%">
              <col style="width:26%">
              <col style="width:22%">
              <col style="width:18%">
            </colgroup>
            <thead>
              <tr>
                <th>转账单号</th>
                <th>转账时间</th>
                <th class="text-right">转账金额</th>
                <th class="text-center">转账状态</th>
              </tr>
            </thead>
            <tbody id="recordsTbody">
              ${renderRecords()}
            </tbody>
          </table>
        </div>
        ${pagination(TRANSFER_RECORDS.length)}
      </div>

      <!-- 二次确认弹窗：转账到交易账户 -->
      <div class="modal" id="confirmModal">
        <div class="modal-mask" data-act="close-confirm"></div>
        <div class="modal-body confirm-modal">
          <div class="modal-head">
            <h3>转账到交易账户</h3>
            <button class="modal-close" data-act="close-confirm">✕</button>
          </div>
          <div class="modal-content">
            <p class="confirm-tip">
              您将把可提现金额
              <b class="confirm-amt" id="confirmAmt">${fmtUSDT(ACCOUNT.withdrawable)}</b>
              <span>全额转账到您的<b>交易账户</b>，转账后立即到账，可在交易账户进行交易或提现操作。</span>
            </p>
            <p class="confirm-note">提示：本次操作不可撤销，请确认是否继续。</p>
          </div>
          <div class="modal-foot">
            <button class="btn-outline" data-act="close-confirm">取消</button>
            <button class="btn-primary" id="btnConfirmTransfer">确认转账</button>
          </div>
        </div>
      </div>
    `;

    /* ============== 表格行渲染 ============== */
    function renderRecords() {
      if (!TRANSFER_RECORDS.length) return emptyRow(4);
      return TRANSFER_RECORDS.map((r) => `
        <tr>
          <td class="mono">${r.orderNo}</td>
          <td class="muted">${r.time}</td>
          <td class="text-right num strong">${fmtUSDT(r.amount)}</td>
          <td class="text-center">${resultTag(r.status)}</td>
        </tr>
      `).join('');
    }

    /* ============== 公用：空态 / 分页 ============== */
    function emptyRow(cols) {
      return `
        <tr class="empty-row">
          <td colspan="${cols}">
            <div class="empty-cell">
              <svg viewBox="0 0 64 64" width="48" height="48" class="empty-svg">
                <rect x="8" y="14" width="48" height="38" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
                <line x1="8" y1="24" x2="56" y2="24" stroke="#cbd5e1" stroke-width="1.5"/>
                <circle cx="14" cy="19" r="1.4" fill="#cbd5e1"/>
                <circle cx="18" cy="19" r="1.4" fill="#cbd5e1"/>
                <circle cx="22" cy="19" r="1.4" fill="#cbd5e1"/>
                <line x1="16" y1="36" x2="48" y2="36" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
                <line x1="16" y1="42" x2="40" y2="42" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span>暂无资料</span>
            </div>
          </td>
        </tr>
      `;
    }
    function pagination(total) {
      const totalPages = Math.max(1, Math.ceil(total / 20));
      return `
        <div class="pagination">
          <span class="page-info">共 <b>${total}</b> 条 / <b>${totalPages}</b> 页</span>
          <div class="page-size">
            <select class="form-select page-size-sel">
              <option>10 条/页</option>
              <option selected>20 条/页</option>
              <option>50 条/页</option>
              <option>100 条/页</option>
            </select>
          </div>
          <div class="page-btns">
            <button class="page-btn" data-page="first" title="首页">«</button>
            <button class="page-btn" data-page="prev" title="上一页">‹</button>
            <button class="page-btn active">1</button>
            <button class="page-btn" data-page="next" title="下一页">›</button>
            <button class="page-btn" data-page="last" title="末页">»</button>
          </div>
        </div>
      `;
    }

    /* ============== 弹窗工具 ============== */
    function openModal(id)  { document.getElementById(id).classList.add('show'); }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }

    /* ============== 生成转账单号（前缀 ITX + 时间戳后 13 位） ============== */
    function genOrderNo() {
      const ts = String(Date.now());
      return 'ITX' + ts;
    }
    function nowStr() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    window.onPageReady = function () {
      const btnTransfer = document.getElementById('btnTransfer');

      // 点击"转账到交易账户" → 打开二次确认（如果可提现为 0，给提示）
      btnTransfer.addEventListener('click', () => {
        if (ACCOUNT.withdrawable <= 0) {
          return toast('可提现金额为 0，无需转账', 'danger');
        }
        // 同步当前金额到弹窗内
        document.getElementById('confirmAmt').textContent = fmtUSDT(ACCOUNT.withdrawable);
        openModal('confirmModal');
      });

      // 关闭按钮（× / 取消 / 蒙层）
      document.querySelectorAll('[data-act="close-confirm"]').forEach((el) => {
        el.addEventListener('click', () => closeModal('confirmModal'));
      });

      // 确认转账：模拟成功 → 余额清零 → 已提现累加 → 列表插入一条新记录 → toast
      document.getElementById('btnConfirmTransfer').addEventListener('click', () => {
        const amt = ACCOUNT.withdrawable;
        if (amt <= 0) {
          closeModal('confirmModal');
          return toast('可提现金额为 0，无需转账', 'danger');
        }

        // 更新账户余额（仅前端模拟）
        ACCOUNT.withdrawn   += amt;
        ACCOUNT.withdrawable = 0;

        // 插入一条新记录到顶部
        TRANSFER_RECORDS.unshift({
          orderNo: genOrderNo(),
          time:    nowStr(),
          amount:  amt,
          status:  '转账成功',
        });

        // 刷新展示
        document.getElementById('balWithdrawable').textContent = fmtUSDT(ACCOUNT.withdrawable);
        document.getElementById('balWithdrawn').textContent    = fmtUSDT(ACCOUNT.withdrawn);
        document.getElementById('recordsTbody').innerHTML      = renderRecords();

        closeModal('confirmModal');
        toast(`已成功转账 ${fmtUSDT(amt)} 到交易账户`, 'success');
      });

      // 分页（占位）
      document.querySelectorAll('.page-btn').forEach((b) => {
        b.addEventListener('click', () => {
          if (b.classList.contains('active')) return;
          toast('翻页（占位）', 'success');
        });
      });
    };

    initLayout(PAGE_CONTENT);
  </script>

  <style>
    /* —— 顶部 2 卡 —— */
    .balance-row {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr);
      gap: 14px;
      margin-bottom: 14px;
    }
    .bal-card {
      background: #fff;
      border-radius: var(--radius-md);
      padding: 22px 24px;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .bal-card-pro {
      background: linear-gradient(135deg, #f6fdfa 0%, #ffffff 60%);
      border: 1px solid #e0f5ec;
    }
    .bal-deco {
      position: absolute;
      right: -10px; bottom: -10px;
      width: 160px; height: 160px;
      pointer-events: none;
    }
    .bal-inner { position: relative; z-index: 1; }
    .bal-label {
      font-size: var(--fs-meta);
      color: var(--color-text-secondary);
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .bal-num {
      font-size: 34px;
      font-weight: var(--fw-bold);
      letter-spacing: -0.5px;
      line-height: 1.2;
      font-family: ui-monospace, 'SF Mono', Consolas, monospace;
    }
    .bal-num-primary { color: var(--color-primary); }
    .bal-num-muted { color: var(--color-text); }

    .bal-actions {
      margin-top: 14px;
      display: flex; gap: 8px;
    }
    .btn-bal-primary {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      font-size: var(--fs-body);
      font-weight: var(--fw-medium);
      color: #fff;
      background: var(--color-primary);
      border: none; border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0,200,150,0.25);
    }
    .btn-bal-primary:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0,200,150,0.3);
    }

    /* —— 转账记录 —— */
    .record-card { padding: 20px 22px; }

    .sec-head {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f3f7;
    }
    .sec-num {
      flex-shrink: 0;
      width: 26px; height: 26px;
      border-radius: 6px;
      background: linear-gradient(135deg, #00c896 0%, #00a87d 100%);
      color: #fff; font-size: var(--fs-meta); font-weight: var(--fw-bold);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,200,150,0.25);
    }
    .sec-title { font-size: var(--fs-h2); font-weight: var(--fw-bold); color: var(--color-text); }
    .sec-sub { font-size: var(--fs-meta); color: var(--color-text-secondary); margin-top: 1px; }

    /* —— 表格 —— */
    .biz-table {
      table-layout: fixed;
      width: 100%;
    }
    .biz-table th, .biz-table td {
      vertical-align: middle;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 11px 16px;
    }
    .muted { color: var(--color-text-muted); }
    .mono {
      font-family: ui-monospace, 'SF Mono', Consolas, monospace;
      font-size: var(--fs-body-sm);
      color: var(--color-text);
    }
    .num {
      font-family: ui-monospace, 'SF Mono', Consolas, monospace;
      color: var(--color-text);
    }
    .num.strong { color: var(--color-primary); font-weight: var(--fw-semibold); }

    /* 转账状态 tag —— 仅成功 / 失败 两种 */
    .st-tag {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 10px;
      font-size: var(--fs-body-sm);
      font-weight: var(--fw-semibold);
    }
    .st-success { background: #dcfce7; color: #15803d; }
    .st-fail    { background: #fee2e2; color: #b91c1c; }

    /* —— 空态 + 分页 —— */
    .empty-row td { padding: 0; border-bottom: none; }
    .empty-cell {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      padding: 56px 20px;
      color: var(--color-text-muted);
      font-size: var(--fs-meta);
    }
    .empty-svg { opacity: 0.7; }

    .pagination {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 14px; margin-top: 14px;
    }
    .page-info { font-size: var(--fs-meta); color: var(--color-text-secondary); }
    .page-info b { color: var(--color-text); }
    .page-size-sel {
      padding: 5px 24px 5px 10px;
      font-size: var(--fs-body-sm);
      border-radius: 4px;
      border: 1px solid var(--color-border);
      background: #fff; cursor: pointer; font-family: inherit;
    }
    .page-btns { display: flex; gap: 4px; }
    .page-btn {
      min-width: 28px; height: 28px;
      padding: 0 8px;
      border: 1px solid var(--color-border);
      background: #fff; color: var(--color-text);
      cursor: pointer; border-radius: 4px;
      font-size: var(--fs-body-sm);
      transition: all 0.15s; font-family: inherit;
    }
    .page-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .page-btn.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff; cursor: default;
    }

    /* —————————————————————————————————————— 弹窗通用 */
    .modal {
      position: fixed; inset: 0;
      z-index: 999;
      display: none;
    }
    .modal.show { display: flex; align-items: center; justify-content: center; }
    .modal-mask {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(2px);
    }
    .modal-body {
      position: relative; z-index: 1;
      background: #fff; border-radius: 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
      animation: modalIn 0.2s;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* —— 二次确认弹窗 —— */
    .confirm-modal { width: 460px; max-width: 92vw; }

    .modal-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid #f0f3f7;
    }
    .modal-head h3 {
      font-size: var(--fs-h2);
      font-weight: var(--fw-bold);
      color: var(--color-text);
    }
    .modal-close {
      width: 26px; height: 26px;
      border: none; background: transparent;
      cursor: pointer; border-radius: 4px;
      color: var(--color-text-muted);
      font-size: 16px;
    }
    .modal-close:hover { background: #f0f3f7; color: var(--color-text); }
    .modal-content { padding: 20px 22px; }

    .confirm-tip {
      font-size: var(--fs-body);
      color: var(--color-text);
      line-height: 1.65;
    }
    .confirm-amt {
      color: var(--color-primary);
      font-weight: var(--fw-bold);
      font-family: ui-monospace, monospace;
      margin: 0 4px;
    }
    .confirm-note {
      margin-top: 12px;
      padding: 10px 12px;
      background: #fff8e6;
      border: 1px solid #fde68a;
      border-radius: 6px;
      font-size: var(--fs-meta);
      color: #92400e;
      line-height: 1.6;
    }

    /* 弹窗底部按钮 */
    .modal-foot {
      padding: 12px 20px;
      display: flex; justify-content: flex-end; gap: 8px;
      border-top: 1px solid #f0f3f7;
      background: #fafbfc;
      border-radius: 0 0 14px 14px;
    }
    .modal-foot .btn-outline,
    .modal-foot .btn-primary {
      padding: 7px 18px;
      font-size: var(--fs-body);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      font-weight: var(--fw-medium);
      border: 1px solid transparent;
    }
    .modal-foot .btn-outline {
      color: var(--color-text);
      background: #fff;
      border-color: var(--color-border);
    }
    .modal-foot .btn-outline:hover {
      color: var(--color-primary);
      border-color: var(--color-primary);
    }
    .modal-foot .btn-primary {
      color: #fff;
      background: var(--color-primary);
    }
    .modal-foot .btn-primary:hover { background: var(--color-primary-hover); }

    /* —— 响应式 —— */
    @media (max-width: 900px) {
      .balance-row { grid-template-columns: 1fr; }
    }
  </style>
</body>
</html>
