<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>登录 - ZB Agent</title>
  <link rel="stylesheet" href="assets/css/common.css?v=7">
  <style>
    /* —————————————————————————————————————— 登录页独立布局 */
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      min-height: 100vh;
      background: #fff;
    }

    /* —————————————————————————————————————— 左侧绿色 Hero 区 */
    .login-left {
      flex: 1;
      background: linear-gradient(135deg, #00c896 0%, #00a87d 50%, #008b6a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    /* 背景装饰圆 */
    .login-left::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .login-left::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -80px;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .login-illustration {
      width: 100%;
      max-width: 420px;
      height: auto;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }
    .brand-title {
      font-size: 36px;
      font-weight: var(--fw-bold);
      letter-spacing: 4px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }
    .brand-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
    }

    /* —————————————————————————————————————— 右侧表单区 */
    .login-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow-y: auto;
    }
    .lang-switch {
      position: absolute;
      top: 24px; right: 32px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: var(--fs-body-sm);
      color: var(--color-text-secondary);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .lang-switch:hover {
      background: #f0f3f7;
      color: var(--color-text);
    }
    .lang-switch svg { color: var(--color-text-muted); }

    .login-form {
      width: 100%;
      max-width: 360px;
    }
    .login-form-head { margin-bottom: 32px; }
    .login-title {
      font-size: 30px;
      font-weight: var(--fw-bold);
      color: var(--color-text);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: var(--fs-meta);
      color: var(--color-text-secondary);
    }
    .login-subtitle b {
      color: var(--color-primary);
      font-weight: var(--fw-semibold);
    }

    .login-field { margin-bottom: 20px; }
    .login-label {
      display: block;
      font-size: var(--fs-body-sm);
      color: var(--color-text);
      font-weight: var(--fw-medium);
      margin-bottom: 8px;
    }
    .login-input-wrap {
      position: relative;
    }
    .login-input {
      width: 100%;
      padding: 12px 14px;
      font-size: var(--fs-body);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      transition: border-color 0.2s;
      font-family: inherit;
      background: #fff;
    }
    .login-input:focus {
      outline: none;
      border-color: var(--color-primary);
    }
    .login-input.has-toggle { padding-right: 42px; }
    .password-toggle {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      width: 30px; height: 30px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .password-toggle:hover { color: var(--color-text-secondary); }

    .login-field-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -8px;
      margin-bottom: 24px;
    }
    .forgot-link {
      font-size: var(--fs-body-sm);
      color: var(--color-text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }
    .forgot-link:hover { color: var(--color-primary); }

    .login-button {
      width: 100%;
      padding: 12px;
      font-size: var(--fs-body);
      font-weight: var(--fw-semibold);
      color: #fff;
      background: var(--color-primary);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(0,200,150,0.3);
      letter-spacing: 1px;
    }
    .login-button:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0,200,150,0.4);
    }
    .login-button:active {
      transform: translateY(0);
    }
    .login-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-footer {
      margin-top: 32px;
      text-align: center;
      font-size: var(--fs-meta);
      color: var(--color-text-muted);
    }

    /* —————————————————————————————————————— 响应式：小屏只显示右侧表单 */
    @media (max-width: 900px) {
      .login-left { display: none; }
      .login-right { padding: 24px; }
    }

    /* —————————————————————————————————————— Toast（复用 common.css 的） */
  </style>
</head>
<body>
  <!-- 左侧 Hero -->
  <div class="login-left">
    <!-- 装饰插画：笔记本 + 上涨图表 + 金币 -->
    <svg class="login-illustration" viewBox="0 0 420 320" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="coin-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#fef3c7"/>
          <stop offset="50%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#d97706"/>
        </linearGradient>
        <linearGradient id="screen-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#f0fdf8"/>
        </linearGradient>
      </defs>

      <!-- 底部平台 椭圆 -->
      <ellipse cx="210" cy="290" rx="160" ry="14" fill="rgba(0,0,0,0.15)"/>
      <ellipse cx="210" cy="285" rx="170" ry="20" fill="rgba(255,255,255,0.18)"/>

      <!-- 笔记本电脑 -->
      <!-- 屏幕背板 -->
      <path d="M 110 100 L 310 100 L 310 240 L 110 240 Z" fill="#1f3a4f" rx="8"/>
      <!-- 屏幕 -->
      <rect x="118" y="108" width="184" height="124" rx="3" fill="url(#screen-grad)"/>

      <!-- 屏幕里的图表 -->
      <g transform="translate(128, 120)">
        <!-- 网格 -->
        <g stroke="#e2e8f0" stroke-width="0.5">
          <line x1="0" y1="30" x2="160" y2="30"/>
          <line x1="0" y1="60" x2="160" y2="60"/>
          <line x1="0" y1="90" x2="160" y2="90"/>
        </g>
        <!-- 折线（上涨趋势）-->
        <polyline points="0,90 20,75 40,82 60,60 80,68 100,42 120,48 140,28 160,18"
          fill="none" stroke="#00c896" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- 填充区域 -->
        <polygon points="0,90 20,75 40,82 60,60 80,68 100,42 120,48 140,28 160,18 160,100 0,100"
          fill="rgba(0,200,150,0.15)"/>
        <!-- 节点高亮 -->
        <circle cx="160" cy="18" r="3" fill="#00c896"/>
        <circle cx="160" cy="18" r="6" fill="#00c896" opacity="0.25"/>
        <!-- 上升箭头 -->
        <path d="M 130 8 L 160 8 L 160 -2 L 175 12 L 160 26 L 160 16 L 130 16 Z"
          fill="#00c896" transform="translate(-15, 0)"/>
      </g>

      <!-- 键盘部分 -->
      <path d="M 90 240 L 330 240 L 345 260 L 75 260 Z" fill="#374151"/>
      <ellipse cx="210" cy="248" rx="22" ry="2" fill="#1f2937"/>

      <!-- 金币 1：左上 -->
      <g transform="translate(60, 90)">
        <ellipse cx="0" cy="6" rx="32" ry="9" fill="rgba(120,53,15,0.2)"/>
        <path d="M -30 0 L -30 4 A 30 8 0 0 0 30 4 L 30 0 Z" fill="#92400e"/>
        <ellipse cx="0" cy="0" rx="30" ry="8" fill="url(#coin-grad)" stroke="#b45309" stroke-width="0.5"/>
        <ellipse cx="0" cy="0" rx="22" ry="5.5" fill="none" stroke="#92400e" stroke-width="0.5" opacity="0.4"/>
        <text x="0" y="3" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#78350f">$</text>
      </g>

      <!-- 金币 2：左下，大点 -->
      <g transform="translate(40, 200) rotate(-15)">
        <ellipse cx="0" cy="8" rx="42" ry="11" fill="rgba(120,53,15,0.2)"/>
        <path d="M -40 0 L -40 6 A 40 10 0 0 0 40 6 L 40 0 Z" fill="#92400e"/>
        <ellipse cx="0" cy="0" rx="40" ry="10" fill="url(#coin-grad)" stroke="#b45309" stroke-width="0.6"/>
        <ellipse cx="0" cy="0" rx="32" ry="7" fill="none" stroke="#92400e" stroke-width="0.6" opacity="0.4"/>
        <ellipse cx="-14" cy="-3" rx="8" ry="2" fill="rgba(255,255,255,0.55)"/>
        <text x="0" y="3.5" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#78350f">$</text>
      </g>

      <!-- 金币 3：右侧 -->
      <g transform="translate(360, 150) rotate(20)">
        <ellipse cx="0" cy="7" rx="38" ry="10" fill="rgba(120,53,15,0.2)"/>
        <path d="M -36 0 L -36 5 A 36 9 0 0 0 36 5 L 36 0 Z" fill="#92400e"/>
        <ellipse cx="0" cy="0" rx="36" ry="9" fill="url(#coin-grad)" stroke="#b45309" stroke-width="0.5"/>
        <ellipse cx="0" cy="0" rx="28" ry="6.5" fill="none" stroke="#92400e" stroke-width="0.5" opacity="0.4"/>
        <ellipse cx="-12" cy="-2.5" rx="7" ry="1.8" fill="rgba(255,255,255,0.55)"/>
        <text x="0" y="3" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="700" fill="#78350f">$</text>
      </g>

      <!-- 装饰小圆点 -->
      <circle cx="100" cy="50" r="4" fill="rgba(255,255,255,0.4)"/>
      <circle cx="380" cy="60" r="3" fill="rgba(255,255,255,0.35)"/>
      <circle cx="20" cy="160" r="3" fill="rgba(255,255,255,0.3)"/>
      <circle cx="395" cy="240" r="4" fill="rgba(255,255,255,0.35)"/>
    </svg>

    <div class="brand-title">代理管理后台</div>
    <div class="brand-sub">邀请好友进行交易，赚取更多收益</div>
  </div>

  <!-- 右侧表单 -->
  <div class="login-right">
    <!-- 语言切换 -->
    <div class="lang-switch" id="langSwitch">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.6"/>
        <path d="M2 12h20 M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" stroke="currentColor" stroke-width="1.6"/>
      </svg>
      简体中文
    </div>

    <form class="login-form" id="loginForm" autocomplete="off">
      <div class="login-form-head">
        <h1 class="login-title">登录</h1>
        <p class="login-subtitle">升级代理最高可获得 <b>80%</b> 返佣</p>
      </div>

      <div class="login-field">
        <label class="login-label" for="account">账号</label>
        <div class="login-input-wrap">
          <input type="text" class="login-input" id="account" placeholder="请输入邮箱 / 手机号" />
        </div>
      </div>

      <div class="login-field">
        <label class="login-label" for="password">密码</label>
        <div class="login-input-wrap">
          <input type="password" class="login-input has-toggle" id="password" placeholder="请输入密码" />
          <button type="button" class="password-toggle" id="togglePwd" aria-label="显示/隐藏密码">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="login-field-row">
        <a href="forgot-password.html" class="forgot-link">忘记密码？</a>
      </div>

      <button type="submit" class="login-button" id="btnLogin">登录</button>

      <div class="login-footer">
        © 2026 ZB Agent · 安全可信赖
      </div>
    </form>
  </div>

  <script>
    /* ============== Toast（独立实现，不依赖 common.js）============== */
    function toast(msg, type) {
      const t = document.createElement('div');
      t.className = `toast toast-${type || 'success'}`;
      t.innerHTML = `<span class="toast-ico">${type === 'danger' ? '✕' : '✓'}</span>${msg}`;
      document.body.appendChild(t);
      requestAnimationFrame(() => t.classList.add('show'));
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 250); }, 2000);
    }

    /* ============== 密码显示/隐藏 ============== */
    const pwdInput = document.getElementById('password');
    document.getElementById('togglePwd').addEventListener('click', () => {
      pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password';
    });

    /* ============== 语言切换（占位） ============== */
    document.getElementById('langSwitch').addEventListener('click', () => {
      toast('语言切换功能开发中', 'success');
    });

    /* ============== 登录提交 ============== */
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const account = document.getElementById('account').value.trim();
      const password = pwdInput.value;

      if (!account) return toast('请输入账号', 'danger');
      if (!password) return toast('请输入密码', 'danger');
      if (password.length < 6) return toast('密码至少 6 位', 'danger');

      // 模拟登录成功
      const btn = document.getElementById('btnLogin');
      btn.disabled = true;
      btn.textContent = '登录中...';

      setTimeout(() => {
        try {
          localStorage.setItem('zb_logged_in', '1');
          localStorage.setItem('zb_account', account);
        } catch (err) {}
        toast('登录成功', 'success');
        setTimeout(() => {
          window.location.href = 'rules.html';
        }, 500);
      }, 600);
    });

    /* ============== 已登录则直接跳转（避免重复登录）============== */
    (function checkLogged() {
      try {
        if (localStorage.getItem('zb_logged_in') === '1') {
          // 这里不强制跳转，让用户可以重新登录；如要强制可放开
          // window.location.replace('rules.html');
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
